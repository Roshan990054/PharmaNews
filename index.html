    <!-- Google Analytics GA4 — Replace G-XXXXXXXXXX with your Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', {
        page_title: 'PharmaNews',
        page_location: window.location.href,
        send_page_view: true,
        custom_map: {
          dimension1: 'article_category',
          dimension2: 'article_source'
        }
      });
      window.trackArticleRead = function(title, category, source) {
        gtag('event', 'article_read', {
          event_category: 'engagement', event_label: title,
          article_category: category, article_source: source
        });
      };
      window.trackNewsletterSignup = function(email) {
        gtag('event', 'newsletter_signup', { event_category: 'conversion', event_label: 'newsletter' });
      };
      window.trackSearch = function(query) {
        gtag('event', 'search', { search_term: query });
      };
      window.trackAdImpression = function(slotName) {
        gtag('event', 'ad_impression', { event_category: 'monetization', event_label: slotName });
      };
    </script>
