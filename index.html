<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>PharmaNews — AI-Powered Pharmaceutical Intelligence Platform</title>
    <meta name="description" content="PharmaNews delivers real-time pharmaceutical news, FDA drug approvals, clinical trial results, biotechnology breakthroughs, and AI-powered insights. Trusted by 14,000+ healthcare professionals." />
    <meta name="keywords" content="pharmaceutical news, FDA drug approval, clinical trials, biotechnology, drug approvals 2026, pharma news, healthcare news, medical research, oncology news, vaccine news, AI healthcare" />
    <meta name="author" content="PharmaNews" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://pharmanews.onrender.com" />

    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="GOOGLE_SITE_VERIFICATION_PLACEHOLDER" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pharmanews.onrender.com" />
    <meta property="og:title" content="PharmaNews — AI-Powered Pharmaceutical Intelligence" />
    <meta property="og:description" content="Real-time pharma news powered by 7 AI agents. FDA approvals, clinical trials, biotech breakthroughs delivered daily." />
    <meta property="og:image" content="https://pharmanews.onrender.com/og-image.png" />
    <meta property="og:site_name" content="PharmaNews" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@PharmaNewsAI" />
    <meta name="twitter:title" content="PharmaNews — AI-Powered Pharmaceutical Intelligence" />
    <meta name="twitter:description" content="Real-time pharma news powered by 7 AI agents. FDA approvals, clinical trials, biotech breakthroughs." />
    <meta name="twitter:image" content="https://pharmanews.onrender.com/og-image.png" />

    <!-- Google News -->
    <meta name="news_keywords" content="pharmaceutical, FDA, drug approval, clinical trials, biotechnology, healthcare, medicine" />
    <meta name="syndication-source" content="https://pharmanews.onrender.com" />
    <meta name="original-source" content="https://pharmanews.onrender.com" />

    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "PharmaNews",
      "url": "https://pharmanews.onrender.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://pharmanews.onrender.com/logo.png",
        "width": 200,
        "height": 60
      },
      "description": "AI-powered pharmaceutical news platform delivering real-time FDA approvals, clinical trials, and biotech breakthroughs.",
      "foundingDate": "2026",
      "sameAs": [
        "https://twitter.com/PharmaNewsAI",
        "https://linkedin.com/company/pharmanews",
        "https://facebook.com/pharmanews"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "editorial",
        "email": "news@pharmanews.onrender.com"
      }
    }
    </script>

    <!-- Structured Data — Website Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PharmaNews",
      "url": "https://pharmanews.onrender.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://pharmanews.onrender.com/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data — BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://pharmanews.onrender.com" },
        { "@type": "ListItem", "position": 2, "name": "Drug Approvals", "item": "https://pharmanews.onrender.com/drug-approvals" },
        { "@type": "ListItem", "position": 3, "name": "Clinical Trials", "item": "https://pharmanews.onrender.com/clinical-trials" }
      ]
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet" />

    <!-- Performance -->
    <link rel="dns-prefetch" href="https://newsapi.org" />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
